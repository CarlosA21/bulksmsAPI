spring.application.name=bulksmsAPI
server.port=${PORT:8443}
jwt.secret=${JWT_SECRET:bulksmsapi}



# Database Configuration - using environment variables for Docker
spring.datasource.url=jdbc:mysql://localhost:3306/bulksms
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.CharSet=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.security=debug


paypal.client.id=${PAYPAL_CLIENT_SECRET}
paypal.client.secret=${PAYPAL_CLIENT_ID}
paypal.mode=${PAYPAL_MODE:sandbox}
spring.main.allow-circular-references=true

